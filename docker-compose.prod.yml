# =================================================================
# Production override for docker-compose.yml
#
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Differences vs the base file:
#   - MySQL is NOT published on the host (only reachable on the internal network).
#   - API is exposed only on 127.0.0.1; a reverse proxy (nginx/Apache) terminates
#     TLS and forwards traffic. Edit the binding if your topology differs.
#   - Profile is forced to "docker,prod" (Swagger off, Actuator hardened).
#   - restart: always (instead of unless-stopped) for safer recovery.
#   - Resource limits and JSON-file log rotation to avoid disk exhaustion.
#   - phpMyAdmin is removed via the `tools` profile (never enable in prod).
# =================================================================

services:
  almanatura-db:
    restart: always
    ports: !reset []  # do not publish MySQL on the host in production
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  almanatura-api:
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker,prod
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    ports: !override
      # Bind only to localhost so the reverse proxy is the single ingress.
      - target: 8080
        published: "${API_PORT:-8080}"
        host_ip: "127.0.0.1"
        protocol: tcp
        mode: host
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
