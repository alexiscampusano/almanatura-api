spring.datasource.url=jdbc:h2:mem:almanatura_test;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
app.mail.brevo.api-key=test-api-key

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 unit tests do not run Flyway migrations; rely on JPA schema generation.
spring.flyway.enabled=false

app.jwt.secret=test-secret-do-not-use-in-production-needs-at-least-64-bytes-for-hs512-aaaaaaaaaaaaaa
app.jwt.expiration-ms=3600000
app.jwt.issuer=almanatura-api-test
app.encryption.dni-key=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
app.cors.allowed-origins=http://localhost:5173
app.admin.email=
app.admin.password=
app.rate-limit.login.requests=100
app.rate-limit.login.window-minutes=1
app.rate-limit.register.requests=100
app.rate-limit.register.window-minutes=1
