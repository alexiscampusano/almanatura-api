spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Never auto-mutate the schema in production; rely on migrations or manual DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.devtools.restart.enabled=false

# When TLS terminates at a *trusted* reverse proxy that sanitizes forwarded headers, set e.g.
# server.forward-headers-strategy=native (see Spring Boot docs). Pair with
# APP_RATELIMIT_TRUST_FORWARDED_HEADERS=true so rate limits key off the real client IP.
# Never enable forwarded-header trust when the app is reachable directly from untrusted clients.

logging.level.root=WARN
logging.level.com.almanatura.api=INFO

# Disable Swagger UI in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
