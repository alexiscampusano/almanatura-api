spring.application.name=almanatura-api
server.port=${API_PORT:8080}
server.servlet.context-path=/api/v1

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jackson.time-zone=Europe/Madrid
spring.jackson.default-property-inclusion=non_null
spring.jackson.datatype.datetime.write-dates-as-timestamps=false
spring.web.locale=en
spring.web.locale-resolver=fixed

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
management.tracing.sampling.probability=1.0

app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.jwt.issuer=${APP_JWT_ISSUER:almanatura-api}
app.encryption.dni-key=${APP_ENCRYPTION_DNI_KEY:}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.password=${APP_ADMIN_PASSWORD:}
# Rate-limit buckets key off RemoteAddr unless trust-forwarded-headers=true AND X-Forwarded-For is trusted (reverse proxy).
app.rate-limit.trust-forwarded-headers=${APP_RATELIMIT_TRUST_FORWARDED_HEADERS:false}
app.rate-limit.login.requests=${APP_RATELIMIT_LOGIN_REQUESTS:5}
app.rate-limit.login.window-minutes=${APP_RATELIMIT_LOGIN_WINDOW_MINUTES:1}
app.rate-limit.register.requests=${APP_RATELIMIT_REGISTER_REQUESTS:10}
app.rate-limit.register.window-minutes=${APP_RATELIMIT_REGISTER_WINDOW_MINUTES:1}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from-address=${MAIL_FROM_ADDRESS:comunicaciones@almanatura.com}
app.mail.from-name=${MAIL_FROM_NAME:AlmaNatura}
