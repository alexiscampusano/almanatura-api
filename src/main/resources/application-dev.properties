spring.datasource.url=jdbc:mysql://localhost:3306/almanatura?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:almanatura}
spring.datasource.password=${MYSQL_PASSWORD:almanatura}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.clean-disabled=false

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

logging.level.com.almanatura.api=DEBUG
logging.level.org.springframework.security=DEBUG

management.endpoint.health.show-details=always

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
