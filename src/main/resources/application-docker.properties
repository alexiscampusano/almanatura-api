spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://almanatura-db:3306/almanatura?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.devtools.restart.enabled=false

logging.level.com.almanatura.api=INFO
logging.level.org.springframework.security=INFO
